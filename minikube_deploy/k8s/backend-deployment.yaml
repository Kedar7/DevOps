apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: minikube-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ef_backend:latest
          ports:
            - containerPort: 5000
          env: []
